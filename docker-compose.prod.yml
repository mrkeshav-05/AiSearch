services:
  # Database Service
  postgres:
    container_name: postgres
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aisearch}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aisearch}
      POSTGRES_DB: ${POSTGRES_DB:-aisearch}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - aisearch-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aisearch} -d ${POSTGRES_DB:-aisearch}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache Service
  redis:
    container_name: redis
    image: redis:alpine
    ports:
      - "6379:6379"
    networks:
      - aisearch-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API Service
  backend:
    container_name: backend
    image: backend
    build:
      context: .
      dockerfile: infrastructure/docker/backend.Dockerfile
      target: production
    ports:
      - "8000:8000"
    environment:
      - NODE_ENV=production
      - PORT=8000
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - GROK_API_KEY=${GROK_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-aisearch}:${POSTGRES_PASSWORD:-aisearch}@postgres:5432/${POSTGRES_DB:-aisearch}
      - REDIS_URL=redis://redis:6379
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - GOOGLE_REDIRECT_URI=${GOOGLE_REDIRECT_URI:-http://localhost:8000/api/v1/auth/google/callback}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
      - SEARXNG_BASE_URL=http://searxng:8080
      - SEARXNG_API_URL=http://searxng:8080
      - EMBEDDING_PROVIDER=${EMBEDDING_PROVIDER:-gemini}
      - LLM_PROVIDER=${LLM_PROVIDER:-gemini}
      - EMBEDDING_DIM=${EMBEDDING_DIM:-768}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - UPLOAD_DIR=/app/uploads
      - MAX_UPLOAD_BYTES=${MAX_UPLOAD_BYTES:-52428800}
    volumes:
      - uploads_prod_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      searxng:
        condition: service_started
    networks:
      - aisearch-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend Service
  frontend:
    container_name: frontend
    image: frontend
    build:
      context: .
      dockerfile: infrastructure/docker/frontend.Dockerfile
      target: production
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_WS_URL=${NEXT_PUBLIC_WS_URL:-ws://localhost:8000}
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
    depends_on:
      - backend
    networks:
      - aisearch-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3

  # SearxNG Search Engine
  searxng:
    container_name: searxng
    image: searxng
    build:
      context: .
      dockerfile: searxng.dockerfile
    ports:
      - "8080:8080"
    volumes:
      - ./settings.yml:/etc/searxng/settings.yml:ro
    environment:
      - SEARXNG_BASE_URL=http://localhost:8080/
    networks:
      - aisearch-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/stats"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  aisearch-network:
    driver: bridge

volumes:
  postgres_prod_data:
  uploads_prod_data:
  searxng-data: