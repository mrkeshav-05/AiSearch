services:
  postgres:
    container_name: postgres
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: aisearch
      POSTGRES_PASSWORD: aisearch
      POSTGRES_DB: aisearch
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - 5432:5432
    networks:
      - AiSearch
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aisearch"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    container_name: redis
    image: redis:alpine
    ports:
      - 6379:6379
    networks:
      - AiSearch
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  searxng:
    container_name: searxng
    image: searxng/searxng:latest
    volumes:
      - ./settings.yml:/etc/searxng/settings.yml
    expose:
      - 4000
    ports:
      - 4000:8080
    networks:
      - AiSearch

  backend:
    container_name: backend
    build:
      context: .
      dockerfile: infrastructure/docker/backend.dev.Dockerfile
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - GROK_API_KEY=${GROK_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - NODE_ENV=development
      - PORT=8000
      - SEARXNG_BASE_URL=http://searxng:8080
      - SEARXNG_API_URL=http://searxng:8080
      - BACKEND_PORT=8000
      - DATABASE_URL=postgresql://aisearch:aisearch@postgres:5432/aisearch
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - GOOGLE_REDIRECT_URI=${GOOGLE_REDIRECT_URI:-http://localhost:8000/api/v1/auth/google/callback}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
      # RAG configuration
      - EMBEDDING_PROVIDER=${EMBEDDING_PROVIDER:-gemini}
      - LLM_PROVIDER=${LLM_PROVIDER:-gemini}
      - EMBEDDING_DIM=${EMBEDDING_DIM:-768}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - UPLOAD_DIR=/app/uploads
      - MAX_UPLOAD_BYTES=${MAX_UPLOAD_BYTES:-52428800}
    volumes:
      # Mount source so nodemon picks up changes instantly
      - ./backend/src:/app/backend/src
      - ./shared/src:/app/shared/src
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      searxng:
        condition: service_started
    ports:
      - 8000:8000
    networks:
      - AiSearch

  frontend:
    container_name: frontend
    build:
      context: .
      dockerfile: infrastructure/docker/frontend.dev.Dockerfile
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api
      - NEXT_PUBLIC_API_URL_V1=http://localhost:8000/api/v1
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000
      - NEXT_PUBLIC_APP_URL=http://localhost:3000
      # Required for Next.js file watching to work inside Docker on macOS
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true
    volumes:
      # Mount source so Next.js HMR picks up changes instantly
      - ./frontend/src:/app/frontend/src
      - ./frontend/public:/app/frontend/public
      - ./shared/src:/app/shared/src
    depends_on:
      - backend
    ports:
      - 3000:3000
    networks:
      - AiSearch

networks:
  AiSearch:
    driver: bridge

volumes:
  postgres_data:
  uploads_data:
